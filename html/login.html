<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * {
    margin: 1%;
    padding: 0%;
    font-family: sans-serif;
    transition: all 250ms;
  }

  body {
    background-color: #222;
    color: white;
    text-align: center;
    transition: all 250ms;

  }

  button {
    background-color: #444;
    color: white;
    border: 2px solid #444;
    padding: 5px 10px;
    font-size: 15px;
    border-radius: 5px;
  }

  input {
    background-color: #fff;
    border: 2px #fff solid;
    border-radius: 5px;
    padding: 2px 5px;
    margin: 20px;
  }


  

  button:hover {
    transform: translateY(-3px);
    background-color: #333;
    border: #333 2px solid;
  }

  p {
    margin: 10px 10px;
  }
</style>
    <title>Login for the sundowner</title>
  </head>
  <body>
    <h1>Sign in</h1>
    <hr />
    <form>
      <input type="text" placeholder="Username" id="username" />
      <br />
      <input type="password" id="password" placeholder="Password" />
      <br />
      <button type="button" onclick="login()">Log in</button>
      <p id="fuckoff"></p>
    </form>
    <script>
      var objPeople = [
        {
          username: "John",
          password: "walrus",
        },
        {
          username: "Paul",
          password: "penny",
        },
        {
          username: "George",
          password: "octopus",
        },
        {
          username: "Ringo",
          password: "hello",
        },
      ];

      function login() {
        var username = document.getElementById("username").value;
        var password = document.getElementById("password").value;

        for (i = 0; i < objPeople.length; i++) {
          if (
            username == objPeople[i].username &&
            password == objPeople[i].password
          ) {
            document.getElementById("fuckoff").innerHTML =
              username + " is logged in!";
            document.getElementById("fuckoff").style.color = "white";
            console.log(username + " is logged in!");
            window.location.href = "https://google.com";
            return;
          }
          document.getElementById("fuckoff").style.color = "red";
          document.getElementById("fuckoff").innerHTML =
            "Incorrect username and/or password!";
          console.log("fuck off!");
        }
      }
    </script>
  </body>
</html>
